    <link rel="stylesheet" href="css/blocks/countdown/skins.css?v=20260715g">

    <link rel="stylesheet" href="css/blocks/gift/skins.css?v=20260715g">
    <link rel="stylesheet" href="css/blocks/wish/skins.css?v=20260715g">
    <link rel="stylesheet" href="css/blocks/thanks/skins.css?v=20260715g">
    <link rel="stylesheet" href="css/blocks/theme-unifier.css?v=20260715g">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>

<body class="concept-loading">
    <audio id="bgMusic" loop preload="auto"></audio>
    <button class="floating-gift" id="floatingGiftBtn" type="button" aria-label="Mở hộp mừng cưới">
        <i class="bi bi-gift-fill" aria-hidden="true"></i>
    </button>

    <button class="music-player" id="musicBtn" type="button" aria-label="Phát hoặc tạm dừng nhạc">
        <span class="music-equalizer" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </span>
    </button>

    <div class="container">
        <div class="cover">
            <div class="cover__headline" id="coverHeadline"></div>
            <div class="cover__guest" id="coverGuest"></div>
            <div class="card" id="openCard">
                <div class="cover__click">
                    <img src="img/click.png" alt="">
                </div>
            </div>
            <div class="cover__footer">
                <div class="man_name" id="coverGroom"></div>
                <div class="heartbeat">
                    <i class="bi bi-activity"></i>
                </div>
                <div class="women_name" id="coverBride"></div>
            </div>
            <div class="cover__date" id="coverDate"></div>
        </div>

        <div class="invitation">
            <div class="invitation__header" id="invitationHeader"></div>
            <div class="invitation__container">
                <div class="poster">
                    <img id="posterImage" alt="">
                    <svg class="wave" viewBox="0 0 1440 200" preserveAspectRatio="none">
                        <path fill="#ffffff"
                            d="M0,96L80,112C160,128,320,160,480,160C640,160,800,128,960,122.7C1120,117,1280,139,1360,149.3L1440,160L1440,320L0,320Z">
                        </path>
                    </svg>
                    <div class="poster-content">
                        <div class="couple">
                            <div class="text_1" id="posterGroom"></div>
                            <div class="heart">
                                <i class="bi bi-heart-fill"></i>
                            </div>
                            <div class="text_2" id="posterBride"></div>
                        </div>

                        <div class="info">
                            <div class="date__time" id="posterDate"></div>
                            <div class="location" id="posterLocation"></div>
                        </div>
                    </div>

                </div>

                <section class="save-date" id="saveDateSection">

                    <div class="save-title animate-item" id="saveDateTitle"></div>

                    <p class="section-subtitle animate-item" id="saveDateSubtitle"></p>

                    <div class="month-year animate-item">

                        <span id="month"></span>

                        <span class="dot">•</span>

                        <span id="year"></span>

                    </div>

                    <div class="calendar animate-item">

                        <div class="week">

                            <span>Mon</span>
                            <span>Tue</span>
                            <span>Wed</span>
                            <span>Thu</span>
                            <span>Fri</span>
                            <span>Sat</span>
                            <span>Sun</span>

                        </div>

                        <div id="calendarDays" class="days">
                        </div>

                    </div>

                </section>

                <div class="section-divider" aria-hidden="true">
                    <span></span>
                </div>

                <section class="about" id="aboutSection">

                    <h2 class="about-title" id="aboutTitle"></h2>

                    <p class="section-subtitle" id="aboutSubtitle"></p>

                    <div class="about-portrait" id="aboutPortrait">
                        <img id="aboutPortraitImage" alt="Ảnh cô dâu chú rể">
                        <div class="about-portrait__text">
                            <span id="aboutPortraitScript"></span>
                            <strong id="aboutPortraitTitle"></strong>
                        </div>
                    </div>

                    <div class="person person--groom">

                        <img id="groomAvatar">

                        <div class="person-name" id="groomName"></div>

                        <div class="parent" id="groomFather"></div>

                        <div class="parent" id="groomMother"></div>

                    </div>

                    <div class="person person--bride">

                        <img id="brideAvatar">

                        <div class="person-name" id="brideName"></div>

                        <div class="parent" id="brideFather"></div>

                        <div class="parent" id="brideMother"></div>

                    </div>

                </section>

                <div class="section-divider" aria-hidden="true">
                    <span></span>
                </div>

                <section class="timeline" id="timelineSection">
                    <h2 class="section-title" id="timelineTitle"></h2>
                    <p class="section-subtitle" id="timelineSubtitle"></p>
                    <div id="timelineCards"></div>
                </section>

                <div class="section-divider" aria-hidden="true">
                    <span></span>
                </div>

                <section class="gallery" id="gallerySection">

                    <h2 class="section-title" id="galleryTitle"></h2>

                    <p class="section-subtitle" id="gallerySubtitle"></p>

                    <div class="gallery-grid">
                    </div>

                </section>

                <div class="section-divider" aria-hidden="true">
                    <span></span>
                </div>

                <section class="wish" id="wishSection">

                    <h2 class="section-title" id="wishTitle"></h2>

                    <p class="section-subtitle" id="wishSubtitle"></p>

                    <div class="wish-form">

                        <input id="wishName" type="text">

                        <div class="wish-side">
                            <div class="side-group" id="wishSideGroup"></div>
                        </div>

                        <div class="wish-attendance">
                            <div class="wish-label" id="wishAttendanceLabel"></div>
                            <div class="side-group" id="wishAttendanceGroup"></div>
                        </div>

                        <textarea id="wishMessage" rows="5"></textarea>

                        <button id="wishBtn" type="button"></button>

                    </div>

                    <div class="wish-list" id="wishList"></div>

                    <button id="loadMoreBtn" class="load-more" type="button"></button>

                </section>

                <div class="section-divider" aria-hidden="true">
                    <span></span>
                </div>

                <section class="gift" id="giftSection">

                    <h2 class="section-title" id="giftTitle"></h2>

                    <p class="section-subtitle" id="giftSubtitle"></p>

                    <div class="gift-desc" id="giftDesc"></div>

                    <button class="gift-box" id="openGiftBox" type="button" aria-label="Mở hộp mừng cưới">
                        <span class="gift-box__lid"></span>
                        <span class="gift-box__body"></span>
                        <span class="gift-box__ribbon"></span>
                        <span class="gift-box__text" id="giftOpenLabel"></span>
                    </button>

                    <div class="gift-modal" id="giftModal" aria-hidden="true">

                        <div class="gift-modal__backdrop" id="closeGiftBackdrop"></div>

                        <div class="gift-modal__content" role="dialog" aria-modal="true"
                            aria-label="Thông tin mừng cưới">

                            <button class="gift-modal__close" id="closeGiftBox" type="button" aria-label="Đóng">
                                ×
                            </button>

                            <div id="giftCards"></div>

                        </div>

                    </div>

                </section>

                <div class="section-divider" aria-hidden="true">
                    <span></span>
                </div>

                <section class="countdown" id="countdownSection">

                    <h2 class="section-title" id="countdownTitle"></h2>

                    <p class="section-subtitle" id="countdownSubtitle"></p>

                    <div class="countdown-grid">

                        <div class="count-item">
                            <div id="days">00</div>
                            <span id="countdownDaysLabel"></span>
                        </div>

                        <div class="count-item">
                            <div id="hours">00</div>
                            <span id="countdownHoursLabel"></span>
                        </div>

                        <div class="count-item">
                            <div id="minutes">00</div>
                            <span id="countdownMinutesLabel"></span>
                        </div>

                        <div class="count-item">
                            <div id="seconds">00</div>
                            <span id="countdownSecondsLabel"></span>
                        </div>

                    </div>

                </section>

                <div class="section-divider" aria-hidden="true">
                    <span></span>
                </div>

                <section class="thanks" id="thanksSection">

                    <div class="thanks-heart">
                        <i class="bi bi-heart-fill"></i>
                    </div>

                    <div class="thanks-title" id="thanksTitle"></div>

                    <p class="section-subtitle" id="thanksSubtitle"></p>

                    <div class="thanks-content" id="thanksContent"></div>

                    <div class="thanks-sign">

                        <span id="thanksGroom"></span>

                        <span class="thanks-heart-small">
                            <i class="bi bi-heart-fill"></i>
                        </span>

                        <span id="thanksBride"></span>

                    </div>

                </section>

            </div>
            <div class="invitation__footer"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/12.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore-compat.js"></script>
    <script type="module" src="js/app.js"></script>

</body>

</html>
