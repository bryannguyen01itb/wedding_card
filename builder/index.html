<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Block Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lora:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700;800&family=Parisienne&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="builder.css">
</head>
<body>
    <main class="builder-shell">
        <section class="builder-panel">
            <div class="builder-heading">
                <p>Wedding Block Builder</p>
                <h1>Khach tu chon giao dien thiep</h1>
                <span>Chi nhap ten, mau, font va block. Anh, nhac, noi dung chi tiet admin se sua sau.</span>
            </div>

            <form id="builderForm" class="builder-form">
                <section class="card">
                    <h2>Thong tin de tao thiep</h2>
                    <div class="grid two">
                        <label>Ten chu re<input name="groomNickname" value="HUNG" required></label>
                        <label>Ten co dau<input name="brideNickname" value="HANG" required></label>
                        <label>Ngay cuoi<input name="date" type="date" value="2026-09-12" required></label>
                        <label>Mau chu dao<input name="primaryColor" type="color" value="#c9974f"></label>
                    </div>
                    <label>Wedding ID<input id="weddingId" name="weddingId" readonly></label>
                </section>

                <section class="card">
                    <h2>Chon block giao dien</h2>
                    <div class="choice-grid">
                        <label>Cover<select name="blockCover"><option value="concept-1">Concept 1</option><option value="concept-2">Concept 2</option><option value="concept-3">Concept 3</option><option value="concept-4">Concept 4</option></select></label>
                        <label>Poster dau thiep<select name="blockPoster"><option value="concept-1">Concept 1</option><option value="concept-2">Concept 2</option><option value="concept-3">Concept 3</option><option value="concept-4">Concept 4</option></select></label>
                        <label>Save date<select name="blockSaveDate"><option value="concept-1">Concept 1</option><option value="concept-2">Concept 2</option><option value="concept-3">Concept 3</option><option value="concept-4">Concept 4</option></select></label>
                        <label>About<select name="blockAbout"><option value="concept-1">Concept 1</option><option value="concept-2">Concept 2</option><option value="concept-3">Concept 3</option><option value="concept-4">Concept 4</option></select></label>
                        <label>Timeline<select name="blockTimeline"><option value="concept-1">Concept 1</option><option value="concept-2">Concept 2</option><option value="concept-3">Concept 3</option><option value="concept-4">Concept 4</option></select></label>
                        <label>Gallery<select name="blockGallery"><option value="concept-1">Concept 1</option><option value="concept-2">Concept 2</option><option value="concept-3">Concept 3</option><option value="concept-4">Concept 4</option></select></label>
                        <label>Countdown<select name="blockCountdown"><option value="concept-1">Concept 1</option><option value="concept-2">Concept 2</option><option value="concept-3">Concept 3</option><option value="concept-4">Concept 4</option></select></label>
                        <label>Ngan cach section<select name="blockDivider"><option value="concept-1">Concept 1</option><option value="concept-2">Concept 2</option><option value="concept-3">Concept 3</option><option value="concept-4">Concept 4</option></select></label>
                    </div>
                </section>

                <section class="card">
                    <h2>Font chu</h2>
                    <div class="grid two">
                        <label>Font tong quat<select name="fontBody"><option value="quicksand">Quicksand</option><option value="lora">Lora</option><option value="nunito">Nunito Sans</option></select></label>
                        <label>Font ten rieng<select name="fontNickname"><option value="great-vibes">Great Vibes</option><option value="parisienne">Parisienne</option><option value="lora">Lora</option></select></label>
                    </div>
                </section>

                <div class="actions">
                    <button type="button" id="previewBtn"><i class="bi bi-eye-fill"></i> Xem preview</button>
                    <button id="saveBtn" type="submit"><i class="bi bi-cloud-upload-fill"></i> Luu Firebase</button>
                </div>
                <p id="status" class="status"></p>
                <div id="resultLinks" class="result-links" hidden>
                    <p>Da luu thanh cong. Gui cho khach 2 link nay:</p>
                    <a id="invitationLink" href="#" target="_blank" rel="noopener noreferrer">Link xem thiep</a>
                    <a id="editLink" href="#" target="_blank" rel="noopener noreferrer">Link sua lai mau</a>
                </div>
            </form>
        </section>

        <section class="preview-panel">
            <div class="phone-frame">
                <iframe id="previewFrame" title="Preview thiep"></iframe>
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script type="module" src="builder.js"></script>
</body>
</html>
